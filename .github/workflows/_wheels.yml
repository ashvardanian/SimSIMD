name: Build Python Wheels

on:
  workflow_call:
    inputs:
      ref:
        type: string
        default: ""

env:
  PYTHONUTF8: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_wheels_linux_x86:
    name: Build Python Wheels (Linux x86)
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ["310", "311", "312", "313", "313t", "314", "314t"]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}
      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install cibuildwheel
        uses: nick-fields/retry@v4
        with:
          max_attempts: 3
          retry_wait_seconds: 10
          timeout_minutes: 120
          command: python -m pip install cibuildwheel
      - name: Build wheels
        uses: nick-fields/retry@v4
        with:
          max_attempts: 2
          retry_wait_seconds: 30
          timeout_minutes: 120
          command: cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: cp${{ matrix.python-version }}-*
          CIBW_ENABLE: cpython-freethreading # No-GIL 3.13t builds
          CIBW_PLATFORM: linux
          CIBW_ARCHS: x86_64
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: cibw-wheels-linux-x86-cp${{ matrix.python-version }}
          path: wheelhouse/*.whl
          overwrite: true

  # These are maintained by Arm, not GitHub, so we need to include
  # extra steps, like installing Docker and starting the service
  build_wheels_linux_arm:
    name: Build Python Wheels (Linux ARM)
    runs-on: ubuntu-24.04-arm
    strategy:
      matrix:
        python-version: ["310", "311", "312", "313", "313t", "314", "314t"]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}
      - name: Install Docker CE from Official Repository
        uses: nick-fields/retry@v4
        with:
          max_attempts: 3
          retry_wait_seconds: 15
          timeout_minutes: 120
          command: |
            sudo apt-get update
            sudo apt-get install -y ca-certificates curl gnupg lsb-release
            sudo mkdir -p /etc/apt/keyrings
            curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
            sudo apt-get update
            sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
            sudo systemctl start docker
            sudo chmod 666 /var/run/docker.sock
            docker version
      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install cibuildwheel
        uses: nick-fields/retry@v4
        with:
          max_attempts: 3
          retry_wait_seconds: 10
          timeout_minutes: 120
          command: python -m pip install cibuildwheel
      - name: Build wheels
        uses: nick-fields/retry@v4
        with:
          max_attempts: 2
          retry_wait_seconds: 30
          timeout_minutes: 120
          command: cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: cp${{ matrix.python-version }}-*
          CIBW_ENABLE: cpython-freethreading # No-GIL 3.13t builds
          CIBW_PLATFORM: linux
          CIBW_ARCHS: aarch64
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: cibw-wheels-linux-arm-cp${{ matrix.python-version }}
          path: wheelhouse/*.whl
          overwrite: true

  build_wheels_macos_x86:
    name: Build Python Wheels (macOS x86)
    runs-on: macos-26
    strategy:
      matrix:
        python-version: ["310", "311", "312", "313", "313t", "314", "314t"]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}
      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install cibuildwheel
        uses: nick-fields/retry@v4
        with:
          max_attempts: 3
          retry_wait_seconds: 10
          timeout_minutes: 120
          command: python -m pip install cibuildwheel
      - name: Build wheels
        uses: nick-fields/retry@v4
        with:
          max_attempts: 2
          retry_wait_seconds: 30
          timeout_minutes: 120
          command: cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: cp${{ matrix.python-version }}-*
          CIBW_ENABLE: cpython-freethreading # No-GIL 3.13t builds
          CIBW_PLATFORM: macos
          CIBW_ARCHS: x86_64
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: cibw-wheels-macos-x86-cp${{ matrix.python-version }}
          path: wheelhouse/*.whl
          overwrite: true

  build_wheels_macos_arm:
    name: Build Python Wheels (macOS ARM)
    runs-on: macos-26
    strategy:
      matrix:
        python-version: ["310", "311", "312", "313", "313t", "314", "314t"]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}
      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install cibuildwheel
        uses: nick-fields/retry@v4
        with:
          max_attempts: 3
          retry_wait_seconds: 10
          timeout_minutes: 120
          command: python -m pip install cibuildwheel
      - name: Build wheels
        uses: nick-fields/retry@v4
        with:
          max_attempts: 2
          retry_wait_seconds: 30
          timeout_minutes: 120
          command: cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: cp${{ matrix.python-version }}-*
          CIBW_ENABLE: cpython-freethreading # No-GIL 3.13t builds
          CIBW_PLATFORM: macos
          CIBW_ARCHS: arm64
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: cibw-wheels-macos-arm-cp${{ matrix.python-version }}
          path: wheelhouse/*.whl
          overwrite: true

  build_wheels_windows:
    name: Build Python Wheels (Windows)
    runs-on: windows-2025
    strategy:
      matrix:
        python-version: ["310", "311", "312", "313", "313t", "314", "314t"]
        architecture: [AMD64]
        include:
          - python-version: "310"
            architecture: ARM64
          - python-version: "311"
            architecture: ARM64
          - python-version: "312"
            architecture: ARM64
          - python-version: "313"
            architecture: ARM64
          - python-version: "313t"
            architecture: ARM64
          - python-version: "314"
            architecture: ARM64
          - python-version: "314t"
            architecture: ARM64
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}
      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Setup MSVC
        uses: microsoft/setup-msbuild@v3
        with:
          vs-version: "17.10"
      - name: Install cibuildwheel
        uses: nick-fields/retry@v4
        with:
          max_attempts: 3
          retry_wait_seconds: 10
          timeout_minutes: 120
          command: python -m pip install cibuildwheel
      - name: Build wheels
        uses: nick-fields/retry@v4
        with:
          max_attempts: 2
          retry_wait_seconds: 30
          timeout_minutes: 120
          command: cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: cp${{ matrix.python-version }}-win_${{ matrix.architecture }}
          CIBW_ENABLE: cpython-freethreading # No-GIL 3.13t builds
          CIBW_PLATFORM: windows
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: cibw-wheels-windows-${{ matrix.architecture }}-cp${{ matrix.python-version }}
          path: wheelhouse/*.whl
          overwrite: true

  build_wheels_other:
    name: Build Python Wheels (Other Platforms)
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ["310", "311", "312", "313", "313t", "314", "314t"]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}
      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4
      - name: Install cibuildwheel
        uses: nick-fields/retry@v4
        with:
          max_attempts: 3
          retry_wait_seconds: 10
          timeout_minutes: 120
          command: python -m pip install cibuildwheel
      - name: Build wheels
        uses: nick-fields/retry@v4
        with:
          max_attempts: 2
          retry_wait_seconds: 30
          timeout_minutes: 120
          command: cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: cp${{ matrix.python-version }}-*
          CIBW_ENABLE: cpython-freethreading # No-GIL 3.13t builds
          CIBW_PLATFORM: linux
          CIBW_ARCHS: ppc64le s390x i686
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: cibw-wheels-other-cp${{ matrix.python-version }}
          path: wheelhouse/*.whl
          overwrite: true

  build_wheels_linux_riscv:
    name: Build Python Wheels (Linux RISC-V)
    # Temporarily disabled until the official PyPA riscv64 images expose a
    # packaged LLVM 23 toolchain, or until we switch to custom images.
    if: ${{ false }}
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ["310", "311", "312", "313", "313t", "314", "314t"]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}
      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4
      - name: Install cibuildwheel
        uses: nick-fields/retry@v4
        with:
          max_attempts: 3
          retry_wait_seconds: 10
          timeout_minutes: 120
          command: python -m pip install cibuildwheel
      - name: Build wheels
        uses: nick-fields/retry@v4
        with:
          max_attempts: 2
          retry_wait_seconds: 30
          timeout_minutes: 120
          command: cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: cp${{ matrix.python-version }}-*
          CIBW_ENABLE: cpython-freethreading
          CIBW_PLATFORM: linux
          CIBW_ARCHS: riscv64
          QEMU_CPU: max
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: cibw-wheels-linux-riscv-cp${{ matrix.python-version }}
          path: wheelhouse/*.whl
          overwrite: true

  build_sdist:
    name: Build Python Source Distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install build
        uses: nick-fields/retry@v4
        with:
          max_attempts: 3
          retry_wait_seconds: 10
          timeout_minutes: 120
          command: pip install build
      - name: Build source distribution
        run: python -m build --sdist
      - name: Upload source distribution
        uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/*.tar.gz
          retention-days: 1
