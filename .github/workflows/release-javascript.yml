name: Release JavaScript

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  build_native:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            os: ubuntu-24.04
            cc: gcc-14
            cxx: g++-14
            node-gyp-args: ""
          - platform: linux-arm64
            os: ubuntu-24.04
            cc: aarch64-linux-gnu-gcc-14
            cxx: aarch64-linux-gnu-g++-14
            node-gyp-args: "--arch=arm64"
          - platform: darwin-arm64
            os: macos-15
            cc: clang
            cxx: clang++
            node-gyp-args: ""
          - platform: darwin-x64
            os: macos-15
            cc: clang
            cxx: clang++
            node-gyp-args: "--arch=x64"
          - platform: win32-x64
            os: windows-latest
            cc: cl.exe
            cxx: cl.exe
            node-gyp-args: ""
    runs-on: ${{ matrix.os }}
    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: "main"
      - name: Update Git Submodules
        run: git submodule update --init --recursive

      - name: Set Up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install System Dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y cmake build-essential libjemalloc-dev libomp-dev
          sudo apt install -y gcc-14-aarch64-linux-gnu g++-14-aarch64-linux-gnu binutils-aarch64-linux-gnu

      - name: Install Node.js Dependencies
        uses: nick-fields/retry@v4
        with:
          max_attempts: 3
          retry_wait_seconds: 10
          timeout_minutes: 120
          command: npm install --ignore-scripts

      - name: Run ISA Probes
        run: node probes/probe.js

      - name: Build Native Module
        run: npx node-gyp rebuild ${{ matrix.node-gyp-args }}

      - name: Copy Binary to Platform Package
        shell: bash
        run: cp build/Release/numkong.node javascript/@numkong-${{ matrix.platform }}/numkong.node

      - name: Upload Platform Package
        uses: actions/upload-artifact@v7
        with:
          name: numkong-${{ matrix.platform }}
          path: javascript/@numkong-${{ matrix.platform }}/
          retention-days: 1

  build_wasm:
    name: Build WASM Bundle
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: "main"
      - name: Update Git Submodules
        run: git submodule update --init --recursive
      - name: Install Emscripten
        uses: nick-fields/retry@v4
        with:
          max_attempts: 3
          retry_wait_seconds: 15
          timeout_minutes: 120
          command: |
            rm -rf ~/emsdk
            git clone --depth 1 https://github.com/emscripten-core/emsdk.git ~/emsdk
            (cd ~/emsdk && ./emsdk install latest && ./emsdk activate latest)
      - name: Set Up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Build WASM
        run: |
          source ~/emsdk/emsdk_env.sh
          cmake -B build_wasm \
            -DCMAKE_TOOLCHAIN_FILE=cmake/toolchain-wasm.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DNK_BUILD_SHARED=ON
          cmake --build build_wasm --config Release
      - name: Build JavaScript and Assemble WASM Bundle
        run: |
          npm install --ignore-scripts
          npm run build-js
          mkdir -p wasm
          cp build_wasm/numkong.js wasm/numkong-emscripten.js
          npx esbuild javascript/dist/esm/numkong-browser.js \
            --bundle --format=esm --platform=browser --target=es2022 \
            --outfile=wasm/numkong.js
          cp build_wasm/numkong.wasm wasm/
          cp javascript/dist/esm/numkong-browser.d.ts wasm/numkong.d.ts
      - name: Upload WASM Bundle
        uses: actions/upload-artifact@v7
        with:
          name: wasm-bundle
          path: wasm
          retention-days: 1
          overwrite: true

  publish_platform_packages:
    name: Publish Platform Packages
    needs: [build_native]
    if: always()
    runs-on: ubuntu-24.04
    environment:
      name: npm-numkong
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        platform: [linux-x64, linux-arm64, darwin-x64, darwin-arm64, win32-x64]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: "main"

      - name: Set Up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Download Platform Artifact
        id: download
        uses: actions/download-artifact@v8
        with:
          name: numkong-${{ matrix.platform }}
          path: javascript/@numkong-${{ matrix.platform }}/
        continue-on-error: true

      - name: Publish @numkong/${{ matrix.platform }}
        if: steps.download.outcome == 'success'
        working-directory: javascript/@numkong-${{ matrix.platform }}
        run: npm publish --provenance --access public

  publish_main:
    name: Publish Main Package to NPM
    needs: [publish_platform_packages, build_wasm]
    if: always() && needs.build_wasm.result == 'success'
    runs-on: ubuntu-24.04
    environment:
      name: npm-numkong
      url: https://www.npmjs.com/package/numkong
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: "main"
      - name: Update Git Submodules
        run: git submodule update --init --recursive

      - name: Set Up Node.js Environment
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Download WASM Bundle
        uses: actions/download-artifact@v8
        with:
          name: wasm-bundle
          path: wasm

      - name: Install Node.js Dependencies
        uses: nick-fields/retry@v4
        with:
          max_attempts: 3
          retry_wait_seconds: 10
          timeout_minutes: 120
          command: npm install --ignore-scripts

      - name: Build JavaScript from TypeScript
        run: npm run build-js

      - name: Run Tests
        run: npm run test

      - name: Publish to NPM
        run: npm publish --provenance --access public
