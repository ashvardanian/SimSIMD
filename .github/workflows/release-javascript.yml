name: Release JavaScript

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  build_javascript:
    name: Build JavaScript Native Modules
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, x86]
        os: [macos-15, ubuntu-24.04]
        exclude:
          - arch: x86
            os: macos-15
          - arch: x86
            os: ubuntu-24.04
    runs-on: ${{ matrix.os }}
    env:
      CC: gcc-14
      CXX: g++-14
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: "main"
      - name: Update Git Submodules
        run: git submodule update --init --recursive
      - name: Set Up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          architecture: ${{ matrix.arch }}
      - name: Update System Compilers (Ubuntu Only)
        if: matrix.os == 'ubuntu-24.04'
        run: |
          echo "Updating compilers and installing build dependencies on Ubuntu"
          sudo apt update
          sudo apt install -y cmake build-essential libjemalloc-dev libomp-dev
          sudo apt install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu
      - name: Install Node.js Dependencies
        run: npm install --ignore-scripts
      - name: Prebuild Native Modules (Linux / Non-Darwin)
        if: matrix.os != 'macos-15'
        run: npm run prebuild-single
      - name: Prebuild Native Modules for macOS
        if: matrix.os == 'macos-15'
        env:
          CC: clang
          CXX: clang++
        run: npm run prebuild-darwin-x64+arm64
      - name: Validate macOS Prebuild Artifacts
        if: matrix.os == 'macos-15'
        run: file prebuilds/*/*
      - name: Cross-Build for ARM64 on Ubuntu
        if: matrix.os == 'ubuntu-24.04'
        run: npm run prebuild-arm64
      - name: Upload Prebuild Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: prebuilds-${{ matrix.os }}
          path: prebuilds
          retention-days: 1
          overwrite: true

  build_wasm:
    name: Build WASM Bundle
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: "main"
      - name: Update Git Submodules
        run: git submodule update --init --recursive
      - name: Install Emscripten
        run: |
          git clone --depth 1 https://github.com/emscripten-core/emsdk.git ~/emsdk
          (cd ~/emsdk && ./emsdk install latest && ./emsdk activate latest)
      - name: Set Up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Build WASM
        run: |
          source ~/emsdk/emsdk_env.sh
          cmake -B build_wasm \
            -DCMAKE_TOOLCHAIN_FILE=cmake/toolchain-wasm.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DNK_BUILD_SHARED=ON
          cmake --build build_wasm --config Release
      - name: Build JavaScript and Assemble WASM Bundle
        run: |
          npm install --ignore-scripts
          npm run build-js
          mkdir -p wasm
          cp build_wasm/numkong.js wasm/numkong-emscripten.js
          npx esbuild javascript/dist/esm/numkong-browser.js \
            --bundle --format=esm --platform=browser --target=es2022 \
            --outfile=wasm/numkong.js
          cp build_wasm/numkong.wasm wasm/
          cp javascript/dist/esm/numkong-browser.d.ts wasm/numkong.d.ts
      - name: Upload WASM Bundle
        uses: actions/upload-artifact@v7
        with:
          name: wasm-bundle
          path: wasm
          retention-days: 1
          overwrite: true

  publish_javascript_npm:
    name: Publish JavaScript to NPM
    needs: [build_javascript, build_wasm]
    runs-on: ubuntu-24.04
    environment:
      name: npm-numkong
      url: https://www.npmjs.com/package/numkong
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: "main"
      - name: Update Git Submodules
        run: git submodule update --init --recursive
      - name: Set Up Node.js Environment
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Download Prebuild Artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: prebuilds-*
          path: prebuilds
          merge-multiple: true
      - name: Download WASM Bundle
        uses: actions/download-artifact@v8
        with:
          name: wasm-bundle
          path: wasm
      - name: Verify File Hard Links (Optional)
        run: find . -type f -links +1
      - name: Install Node.js Dependencies
        run: npm install --ignore-scripts
      - name: Build JavaScript from TypeScript
        run: npm run build-js
      - name: Run Final Tests with Prebuild Artifacts
        run: npm run test
      - name: Publish to NPM
        run: npm publish --provenance --access public
