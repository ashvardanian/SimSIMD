name: Release Swift

on:
  release:
    types: [published]

permissions:
  contents: read

# Swift packages are consumed as source via git tags — no artifact upload needed.
# This workflow validates that the tagged commit builds and passes tests on both
# platforms, so Swift Package Index (and consumers) see a healthy tag.
jobs:
  validate_macos:
    name: Validate on macOS
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: "main"
      - name: Build
        run: swift build
      - name: Test
        run: swift test --filter Test --parallel

  validate_linux:
    name: Validate on Linux
    runs-on: ubuntu-24.04
    container: swift:6.2
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: "main"
      - name: Build
        run: swift build
      - name: Test
        run: swift test --filter Test --parallel
